# shared configuration of rubocop

plugins:
  - rubocop-rails
  - rubocop-performance
  - rubocop-minitest

# Shared config for all projects regarding all cops
AllCops:
  DisplayCopNames: true
  Exclude:
    - bin/**/*
    - exe/**/*
    - tmp/**/*
    - public/**/*
    - vendor/**/*
    - node_modules/**/*
    - db/schema.rb
      # Evaluate git config to exclude all ignored files and folders from rubocop checks.
      # The indentation is to not show the error "Invalid child element in a block sequence" in the editor (by yaml check).
      # Since this file is pre-processed by ERB, the indentation is not visible in the final file.
      # See: https://docs.rubocop.org/rubocop/configuration.html#pre-processing
      <% `git status --ignored --porcelain`.lines.grep(/^!! /).each do |path| %>
    - <%= path.sub(/^!! /, '').sub(/\/$/, '/**/*') %>
      <% end %>
  NewCops: enable
  UseCache: false

# =============================================================================
# Layout cops
# =============================================================================

# https://docs.rubocop.org/rubocop/cops_layout.html#layoutlinelength
Layout/LineLength:
  # allow lines longer than 120 (by default) characters if they are comment lines
  # this is mainly for schema comments from annotate gem
  AllowedPatterns: ['(\A|\s)#']

# =============================================================================
# Metrics cops
# =============================================================================

# NOTE: This cop is listed first (not alphabetically) because it defines the YAML anchor &line_count_metrics
# used by other Metrics cops below.
# For better readability we don't want multiline statements for Arrays, Hashes and HereDoc to count towards the line count.
# Following a team meeting on 4 September 2025, we have decided to exclude test and specification files from these cops.
# https://docs.rubocop.org/rubocop/cops_metrics.html#metricsmodulelength
Metrics/ModuleLength: &line_count_metrics
  CountAsOne:
    - array
    - hash
    - heredoc
  CountComments: false
  Exclude:
    - test/**/*.rb
    - spec/**/*.rb

# Following a team meeting on 4 September 2025, we decided to increase the maximum ABC size per method to 20.
# https://docs.rubocop.org/rubocop/cops_metrics.html#metricsabcsize
Metrics/AbcSize:
  Max: 20

# https://docs.rubocop.org/rubocop/cops_metrics.html#metricsblocklength
Metrics/BlockLength:
  <<: *line_count_metrics
  # Allow large blocks in configs (environments, initializers, routes, etc)
  Exclude:
    - config/**/*.rb
    - test/**/*.rb
    - spec/**/*.rb

# https://docs.rubocop.org/rubocop/cops_metrics.html#metricsclasslength
Metrics/ClassLength:
  <<: *line_count_metrics

# https://docs.rubocop.org/rubocop/cops_metrics.html#metricsmethodlength
Metrics/MethodLength:
  <<: *line_count_metrics
  Max: 15

# =============================================================================
# Rails cops
# =============================================================================

# Following a team discussion on 27 January 2026, we decided to enforce I18n for hard-coded strings in flash messages, redirects, etc.
# https://docs.rubocop.org/rubocop-rails/cops_rails.html#railsi18nlocaletexts
Rails/I18nLocaleTexts:
  Enabled: true
  Exclude:
    - db/**/*

# Per team discussion from 14.03.2024 we decided to prefer and enforce the use of 'referrer' over 'referer'
Rails/RequestReferer:
  Enabled: true
  EnforcedStyle: referrer

Rails/UnknownEnv:
  Enabled: true
  Environments:
    - development
    - test
    - staging
    - production

# =============================================================================
# Style cops
# =============================================================================

# https://www.rubydoc.info/gems/rubocop/RuboCop/Cop/Style/ClassAndModuleChildren
Style/ClassAndModuleChildren:
  Enabled: false

# https://docs.rubocop.org/rubocop/cops_style.html#styledocumentation
Style/Documentation:
  Enabled: true
  Exclude:
    # no need to class document migrations
    - db/migrate/**/*.rb
    - test/**/*.rb

# Following a team discussion on 27 January 2025, we decided to enforce shorthand syntax { name: } instead of { name: name } (Ruby 3.1+).
# https://docs.rubocop.org/rubocop/cops_style.html#stylehashsyntax
Style/HashSyntax:
  EnforcedShorthandSyntax: always

# Following a team discussion on 27 January 2025, we decided to enforce parentheses for all method calls with arguments for better readability and less parsing ambiguity.
# https://docs.rubocop.org/rubocop/cops_style.html#stylemethodcallwithargsparentheses
Style/MethodCallWithArgsParentheses:
  Enabled: true
